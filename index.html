<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shurigatto — Official Site & Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Official site and support page for Shurigatto, an original precision arcade game by Johan Pages (irokhan / Irokhan Games).">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #000;
  color: #ffffff;
  line-height: 1.6;
}

.language-switcher {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1000;
}

.language-switcher button {
  background: transparent;
  border: none;
  font-size: 20px;
  margin-right: 8px;
  cursor: pointer;
  opacity: 0.6;
}

.language-switcher button:hover {
  opacity: 1;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 80px 20px 40px;
  text-align: center;
}

.title-image {
  width: 100%;
  max-width: 650px;
  margin-bottom: 30px;
}

.hero-video {
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  margin-bottom: 40px;
}

.tagline {
  font-size: 18px;
  color: #aaa;
  margin-bottom: 10px;
}

.identity {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 40px;
}

.cta-group {
  margin-bottom: 40px;
}

.cta-button {
  display: inline-block;
  padding: 14px 24px;
  margin: 10px;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
}

.primary {
  background: #ff4f8b;
  color: #fff;
}

.secondary {
  background: #222;
  color: #fff;
}

.disabled {
  opacity: 0.5;
  pointer-events: none;
}

.section {
  margin-top: 60px;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

.footer {
  margin-top: 80px;
  font-size: 13px;
  color: #666;
}
</style>
</head>
<body>

<div class="language-switcher">
  <button onclick="setLanguage('en')">🇬🇧</button>
  <button onclick="setLanguage('fr')">🇫🇷</button>
  <button onclick="setLanguage('it')">🇮🇹</button>
  <button onclick="setLanguage('es')">🇪🇸</button>
  <button onclick="setLanguage('zh')">🇨🇳</button>
</div>

<div class="container">

<img src="store_capsule_main.png" class="title-image">

<video class="hero-video" autoplay muted loop playsinline>
  <source src="trailer_steam.mp4" type="video/mp4">
</video>

<p id="tagline" class="tagline"></p>
<p id="identity" class="identity"></p>

<div class="cta-group">
  <a href="#" class="cta-button primary" id="appstore"></a>

  <a href="#" class="cta-button secondary disabled" id="googleplay"></a>

  <a href="https://store.steampowered.com/app/4344230/Shurigatto/" 
     class="cta-button secondary" 
     target="_blank"
     id="steam"></a>
</div>

<div class="section">
  <h2 id="h1"></h2>
  <p id="p1"></p>
</div>

<div class="section">
  <h2 id="h2"></h2>
  <p id="p2"></p>
</div>

<div class="section">
  <h2 id="supportTitle"></h2>

  <div class="card">
    <h3 id="contactTitle"></h3>
    <p id="contactText"></p>
    <strong>irokhan42@gmail.com</strong>
  </div>

  <div class="card">
    <h3 id="faqTitle"></h3>
    <ul>
      <li id="faq1"></li>
      <li id="faq2"></li>
      <li id="faq3"></li>
    </ul>
  </div>

  <div class="card">
    <h3 id="devTitle"></h3>
    <p id="devText"></p>
  </div>
</div>

<div class="footer">
  © 2026 Johan Pages (irokhan / Irokhan Games)
</div>

</div>

<script>
const t = {
en: {
tagline: "A precision arcade game built around rotation.",
identity: 'Shurigatto is an original game by Johan Pages (irokhan / Irokhan Games).',
appstore: "Download on the App Store",
googleplay: "Coming soon on Google Play",
steam: "Play on Steam",
h1: "You don’t walk. You spin.",
p1: "Control a ninja cat attached to a magical shuriken. Every level is a compact test of timing and angles.",
h2: "Built for Skill",
p2: "No filler. Just tight controls, fast retries, and real progression.",
support: "Support",
contact: "Contact",
contactText: "For help, bug reports, or purchase issues:",
faq: "FAQ",
faq1: "Restore purchases via the in-game button.",
faq2: "Report bugs with device + iOS version.",
faq3: "Gameplay help: mention level or boss.",
dev: "Developer",
devText: "Created and owned by Johan Pages. irokhan / Irokhan Games refer to the same developer."
},

fr: {
tagline: "Un jeu d’arcade de précision basé sur la rotation.",
identity: "Shurigatto est un jeu original de Johan Pages (irokhan / Irokhan Games).",
appstore: "Télécharger sur l’App Store",
googleplay: "Bientôt sur Google Play",
steam: "Jouer sur Steam",
h1: "Vous ne marchez pas. Vous tournez.",
p1: "Un chat ninja relié à un shuriken magique.",
h2: "Conçu pour le skill",
p2: "Contrôle précis, retries rapides.",
support: "Support",
contact: "Contact",
contactText: "Pour toute aide ou bug :",
faq: "FAQ",
faq1: "Restaurer via le bouton in-game.",
faq2: "Envoyer device + iOS.",
faq3: "Mentionner le niveau.",
dev: "Développeur",
devText: "Créé par Johan Pages (irokhan)."
}
};

function setLanguage(lang){
const d = t[lang];
document.getElementById("tagline").innerText = d.tagline;
document.getElementById("identity").innerText = d.identity;
document.getElementById("appstore").innerText = d.appstore;
document.getElementById("googleplay").innerText = d.googleplay;
document.getElementById("steam").innerText = d.steam;
document.getElementById("h1").innerText = d.h1;
document.getElementById("p1").innerText = d.p1;
document.getElementById("h2").innerText = d.h2;
document.getElementById("p2").innerText = d.p2;
document.getElementById("supportTitle").innerText = d.support;
document.getElementById("contactTitle").innerText = d.contact;
document.getElementById("contactText").innerText = d.contactText;
document.getElementById("faqTitle").innerText = d.faq;
document.getElementById("faq1").innerText = d.faq1;
document.getElementById("faq2").innerText = d.faq2;
document.getElementById("faq3").innerText = d.faq3;
document.getElementById("devTitle").innerText = d.dev;
document.getElementById("devText").innerText = d.devText;
}

setLanguage("en");
</script>

</body>
</html>
