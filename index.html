<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shurigatto — Official Site & Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Official site and support page for Shurigatto, an original precision arcade game by Johan Pages (irokhan / Irokhan Games).">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 80px 20px 40px;
  text-align: center;
}

.language-switcher {
  position: fixed;
  top: 15px;
  left: 15px;
}

.language-switcher button {
  background: none;
  border: none;
  font-size: 18px;
  margin-right: 6px;
  opacity: 0.6;
  cursor: pointer;
}

.language-switcher button:hover {
  opacity: 1;
}

.title-image {
  max-width: 650px;
  width: 100%;
  margin-bottom: 30px;
}

.hero-video {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 40px;
}

.tagline {
  color: #aaa;
}

.identity {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 40px;
}

.cta-group {
  margin: 30px 0;
}

.cta {
  display: inline-block;
  padding: 14px 22px;
  margin: 8px;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
}

.primary { background: #ff4f8b; color: white; }
.secondary { background: #222; color: white; }
.disabled { opacity: 0.4; pointer-events: none; }

.section { margin-top: 60px; }

.card {
  background: #111;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

.footer {
  margin-top: 80px;
  font-size: 13px;
  color: #666;
}
</style>
</head>
<body>

<div class="language-switcher">
  <button onclick="setLang('en')">🇬🇧</button>
  <button onclick="setLang('fr')">🇫🇷</button>
</div>

<div class="container">

<img src="store_capsule_main.png" class="title-image">

<video class="hero-video" autoplay muted loop playsinline>
  <source src="trailer_steam.mp4" type="video/mp4">
</video>

<p id="tagline" class="tagline"></p>
<p id="identity" class="identity"></p>

<div class="cta-group">
  <a href="#" class="cta primary" id="appstore"></a>

  <a href="#" class="cta secondary disabled" id="googleplay"></a>

  <a href="https://store.steampowered.com/app/4344230/Shurigatto/" 
     target="_blank"
     class="cta secondary"
     id="steam"></a>
</div>

<div class="section">
  <h2 id="h1"></h2>
  <p id="p1"></p>
</div>

<div class="section">
  <h2 id="h2"></h2>
  <p id="p2"></p>
</div>

<div class="section">
  <h2 id="supportTitle"></h2>

  <div class="card">
    <h3 id="contactTitle"></h3>
    <p id="contactText"></p>
    <strong>irokhan42@gmail.com</strong>
  </div>

  <div class="card">
    <h3 id="faqTitle"></h3>
    <ul>
      <li id="faq1"></li>
      <li id="faq2"></li>
      <li id="faq3"></li>
    </ul>
  </div>

  <div class="card">
    <h3 id="devTitle"></h3>
    <p id="devText"></p>
  </div>
</div>

<div class="footer">
  © 2026 Johan Pages — irokhan / Irokhan Games
</div>

</div>

<script>
const t = {

en: {
tagline: "A precision arcade game built around rotation.",
identity: "Shurigatto is an original game created and owned by Johan Pages (irokhan / Irokhan Games).",
appstore: "Download on the App Store",
googleplay: "Coming soon on Google Play",
steam: "Wishlist on Steam",

h1: "You don’t walk. You spin.",
p1: "Control a ninja cat attached to a magical shuriken. Every level is a compact test of timing and angles.",

h2: "Built for Skill",
p2: "No filler. Just tight controls, instant restarts, and real mastery.",

support: "Support",

contact: "Contact",
contactText: "For support, bug reports, or purchase issues, contact:",

faq: "FAQ",
faq1: "Restore purchases using the in-game 'Restore Purchases' button.",
faq2: "Report bugs by email with your device model and iOS version.",
faq3: "For gameplay help, mention the level or boss you are stuck on.",

dev: "Developer",
devText: "Shurigatto is an original intellectual property created and owned by Johan Pages. 'irokhan' and 'Irokhan Games' refer to the same developer."
},

fr: {
tagline: "Un jeu d’arcade de précision basé sur la rotation.",
identity: "Shurigatto est un jeu original créé et détenu par Johan Pages (irokhan / Irokhan Games).",
appstore: "Télécharger sur l’App Store",
googleplay: "Bientôt sur Google Play",
steam: "Ajouter à la liste de souhaits (Steam)",

h1: "Vous ne marchez pas. Vous tournez.",
p1: "Un chat ninja relié à un shuriken magique.",

h2: "Conçu pour le skill",
p2: "Contrôle précis, redémarrages instantanés.",

support: "Support",

contact: "Contact",
contactText: "Pour toute aide, bug ou problème d’achat :", 

faq: "FAQ",
faq1: "Restaurer les achats via le bouton en jeu.",
faq2: "Envoyer modèle + version iOS.",
faq3: "Mentionner le niveau ou boss.",

dev: "Développeur",
devText: "Shurigatto est une propriété intellectuelle originale créée par Johan Pages. 'irokhan' et 'Irokhan Games' désignent le même développeur."
}

};

function setLang(lang){
const d = t[lang];

document.getElementById("tagline").innerText = d.tagline;
document.getElementById("identity").innerText = d.identity;

document.getElementById("appstore").innerText = d.appstore;
document.getElementById("googleplay").innerText = d.googleplay;
document.getElementById("steam").innerText = d.steam;

document.getElementById("h1").innerText = d.h1;
document.getElementById("p1").innerText = d.p1;
document.getElementById("h2").innerText = d.h2;
document.getElementById("p2").innerText = d.p2;

document.getElementById("supportTitle").innerText = d.support;
document.getElementById("contactTitle").innerText = d.contact;
document.getElementById("contactText").innerText = d.contactText;

document.getElementById("faqTitle").innerText = d.faq;
document.getElementById("faq1").innerText = d.faq1;
document.getElementById("faq2").innerText = d.faq2;
document.getElementById("faq3").innerText = d.faq3;

document.getElementById("devTitle").innerText = d.dev;
document.getElementById("devText").innerText = d.devText;
}

setLang("en");
</script>

</body>
</html>
